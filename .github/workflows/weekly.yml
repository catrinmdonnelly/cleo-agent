name: Cleo weekly growth brief

# Cleo runs once a week, Monday at 07:00 in your local time.
# GitHub Actions cron runs in UTC, so two crons cover BST and GMT for UK users.
# If you're in a different timezone, change these to fire at 07:00 your time.
#   UK BST (summer): 06:00 UTC
#   UK GMT (winter): 07:00 UTC

on:
  schedule:
    - cron: "0 6 * * 1"     # 06:00 UTC Mon = 07:00 UK BST
    - cron: "0 7 * * 1"     # 07:00 UTC Mon = 07:00 UK GMT
  workflow_dispatch:

concurrency:
  group: cleo-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      BUSINESS_NAME: ${{ vars.BUSINESS_NAME || 'your business' }}
      AGENT_TIMEZONE: ${{ vars.AGENT_TIMEZONE || 'Europe/London' }}
      FAILURE_EMAIL_TO: ${{ secrets.FAILURE_EMAIL_TO }}
      FAILURE_EMAIL_FROM: ${{ secrets.FAILURE_EMAIL_FROM }}
      FAILURE_EMAIL_SMTP_HOST: ${{ secrets.FAILURE_EMAIL_SMTP_HOST }}
      FAILURE_EMAIL_SMTP_PASS: ${{ secrets.FAILURE_EMAIL_SMTP_PASS }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cleo
        run: python cleo.py

      - name: Rotate old artefacts
        if: always()
        run: |
          find logs -type f -mtime +90 -delete 2>/dev/null || true
          find reports -type f -name '*.json' -mtime +30 -delete 2>/dev/null || true

      - name: Commit artefacts
        if: always()
        run: |
          git config user.name "cleo-agent-bot"
          git config user.email "cleo-agent-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add --all -- briefs exchange logs reports || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "cleo: weekly growth brief $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
